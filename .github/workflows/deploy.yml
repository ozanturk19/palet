name: Deploy PALET to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 135.181.206.109 >> ~/.ssh/known_hosts

      - name: Install Docker on VPS (if not exists)
        run: |
          ssh root@135.181.206.109 '
            if ! command -v docker &> /dev/null; then
              apt-get update -qq
              apt-get install -y -qq docker.io git
              systemctl enable docker
              systemctl start docker
              echo "Docker kuruldu"
            else
              echo "Docker mevcut: $(docker --version)"
            fi
          '

      - name: Pull latest code on VPS
        run: |
          ssh root@135.181.206.109 '
            if [ -d /opt/palet ]; then
              cd /opt/palet
              git fetch origin
              git checkout main
              git pull origin main
            else
              git clone -b main https://github.com/ozanturk19/palet.git /opt/palet
            fi
          '

      - name: Build Docker image on VPS
        run: |
          ssh root@135.181.206.109 '
            cd /opt/palet/web
            docker build -t palet-web:latest .
            echo "Build tamamlandı"
          '

      - name: Deploy container on VPS
        run: |
          ssh root@135.181.206.109 '
            # Firewall: port 8007 aç
            ufw allow 8007/tcp comment "Palet Web" 2>/dev/null || true
            ufw reload 2>/dev/null || true
            iptables -C INPUT -p tcp --dport 8007 -j ACCEPT 2>/dev/null || \
              iptables -I INPUT -p tcp --dport 8007 -j ACCEPT 2>/dev/null || true

            # Container yeniden başlat
            docker stop palet-web 2>/dev/null || true
            docker rm palet-web 2>/dev/null || true
            docker run -d \
              --name palet-web \
              --restart unless-stopped \
              -p 0.0.0.0:8007:8007 \
              palet-web:latest

            # Bekle ve doğrula
            sleep 8
            docker ps | grep palet-web
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8007)
            echo "Localhost HTTP Status: $STATUS"
            [ "$STATUS" = "200" ] && echo "✅ Site canlıda → http://135.181.206.109:8007" || echo "⚠️ HTTP $STATUS — logları kontrol et"
            docker logs palet-web --tail 10 2>&1
          '
