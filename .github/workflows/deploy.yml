name: Deploy PALET to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build Next.js
        working-directory: web
        run: |
          npm ci
          npm run build
          echo "Build tamamlandı"

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 135.181.206.109 >> ~/.ssh/known_hosts

      - name: Install Node.js & PM2 on VPS (if not exists)
        run: |
          ssh root@135.181.206.109 '
            # Node.js 20
            if ! node --version 2>/dev/null | grep -q "v20"; then
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs
              echo "Node.js kuruldu: $(node --version)"
            else
              echo "Node.js mevcut: $(node --version)"
            fi

            # PM2
            if ! command -v pm2 &> /dev/null; then
              npm install -g pm2
              echo "PM2 kuruldu"
            else
              echo "PM2 mevcut: $(pm2 --version)"
            fi

            # Uygulama dizini
            mkdir -p /opt/palet-app
          '

      - name: Copy build to VPS
        run: |
          # Standalone çıktısını VPS'e kopyala
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            web/.next/standalone/ \
            root@135.181.206.109:/opt/palet-app/

          # Static dosyaları kopyala
          rsync -az --delete \
            -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
            web/.next/static/ \
            root@135.181.206.109:/opt/palet-app/.next/static/

          # Public klasörü (varsa)
          if [ -d web/public ]; then
            rsync -az --delete \
              -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no" \
              web/public/ \
              root@135.181.206.109:/opt/palet-app/public/
          fi

          echo "Dosyalar kopyalandı"

      - name: Start / Restart app with PM2
        run: |
          ssh root@135.181.206.109 '
            cd /opt/palet-app

            # Firewall
            ufw allow 8007/tcp 2>/dev/null || true

            # PM2 ile başlat veya yeniden başlat
            export PORT=8007
            export HOSTNAME=0.0.0.0

            if pm2 describe palet-web > /dev/null 2>&1; then
              pm2 restart palet-web
            else
              PORT=8007 HOSTNAME=0.0.0.0 pm2 start server.js \
                --name palet-web \
                --env production \
                -- --port 8007
            fi

            pm2 save
            pm2 startup 2>/dev/null || true

            sleep 5
            pm2 status palet-web

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8007)
            echo "Localhost HTTP: $STATUS"
            [ "$STATUS" = "200" ] || (echo "HATA: site $STATUS döndü"; pm2 logs palet-web --lines 20 --nostream; exit 1)
          '

      - name: External health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 http://135.181.206.109:8007)
          echo "Dış erişim HTTP: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ http://135.181.206.109:8007 — CANLI"
          else
            echo "❌ Dış erişim yok ($STATUS)"
            exit 1
          fi
