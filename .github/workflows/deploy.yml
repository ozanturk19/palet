name: Deploy PALET to VPS

on:
  push:
    branches:
      - claude/brand-web-design-uWMjl
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 135.181.206.109 >> ~/.ssh/known_hosts

      - name: Install Docker on VPS (if not exists)
        run: |
          ssh root@135.181.206.109 '
            if ! command -v docker &> /dev/null; then
              apt-get update -qq
              apt-get install -y -qq docker.io git
              systemctl enable docker
              systemctl start docker
              echo "Docker kuruldu"
            else
              echo "Docker zaten kurulu: $(docker --version)"
            fi
          '

      - name: Pull latest code on VPS
        run: |
          ssh root@135.181.206.109 '
            if [ -d /opt/palet ]; then
              cd /opt/palet
              git fetch origin
              git checkout ${{ github.ref_name }} 2>/dev/null || git checkout claude/brand-web-design-uWMjl
              git pull origin ${{ github.ref_name }} 2>/dev/null || git pull origin claude/brand-web-design-uWMjl
            else
              git clone -b claude/brand-web-design-uWMjl https://github.com/ozanturk19/palet.git /opt/palet
            fi
          '

      - name: Build Docker image on VPS
        run: |
          ssh root@135.181.206.109 '
            cd /opt/palet/web
            docker build -t palet-web:latest .
            echo "Build tamamlandı"
          '

      - name: Restart container on VPS
        run: |
          ssh root@135.181.206.109 '
            # Firewall: port 8007 aç
            if command -v ufw &> /dev/null; then
              ufw allow 8007/tcp 2>/dev/null || true
              ufw --force enable 2>/dev/null || true
              echo "UFW: port 8007 açıldı"
            fi
            # iptables fallback
            iptables -C INPUT -p tcp --dport 8007 -j ACCEPT 2>/dev/null || \
              iptables -I INPUT -p tcp --dport 8007 -j ACCEPT 2>/dev/null || true

            # Container yeniden başlat
            docker stop palet-web 2>/dev/null || true
            docker rm palet-web 2>/dev/null || true
            docker run -d \
              --name palet-web \
              --restart unless-stopped \
              -p 0.0.0.0:8007:8007 \
              palet-web:latest
            sleep 5
            docker ps | grep palet-web
            curl -sf http://localhost:8007 > /dev/null && echo "✅ Localhost OK" || echo "⚠️ Localhost yanıt vermedi"
            echo "✅ Deploy tamamlandı → http://135.181.206.109:8007"
          '

      - name: Diagnostics
        run: |
          ssh root@135.181.206.109 'bash -s' << '"DIAG"'
            {
              echo "=== Docker PS ==="
              docker ps -a
              echo ""
              echo "=== Container Logs (son 20) ==="
              docker logs palet-web --tail 20 2>&1 || echo "log yok"
              echo ""
              echo "=== Port 8007 ==="
              ss -tlnp | grep 8007 || echo "HATA: 8007 dinlenmiyor!"
              echo ""
              echo "=== Localhost Curl ==="
              curl -s -o /dev/null -w "HTTP Status: %{http_code}\n" http://localhost:8007 || echo "HATA: localhost curl başarısız"
              echo ""
              echo "=== UFW ==="
              ufw status 2>/dev/null || echo "ufw yok"
              echo ""
              echo "=== iptables INPUT ==="
              iptables -L INPUT -n --line-numbers 2>/dev/null | head -20
            } > /tmp/palet_diag.txt 2>&1
            cat /tmp/palet_diag.txt
          DIAG

      - name: Save diagnostics to repo
        run: |
          mkdir -p /tmp/diag
          ssh root@135.181.206.109 'cat /tmp/palet_diag.txt' > /tmp/diag/output.txt
          cp /tmp/diag/output.txt diagnostics.txt
          git config user.email "deploy@palet.app"
          git config user.name "PALET Deploy Bot"
          git add diagnostics.txt
          git diff --staged --quiet || git commit -m "chore: diagnostics output [skip ci]"
          git push origin HEAD:claude/brand-web-design-uWMjl
