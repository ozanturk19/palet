name: Deploy PALET to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 135.181.206.109 >> ~/.ssh/known_hosts

      - name: Install Docker on VPS (if not exists)
        run: |
          ssh root@135.181.206.109 '
            if ! command -v docker &> /dev/null; then
              apt-get update -qq
              apt-get install -y -qq docker.io git
              systemctl enable docker && systemctl start docker
              echo "Docker kuruldu"
            else
              echo "Docker mevcut: $(docker --version)"
            fi
          '

      - name: Pull latest code on VPS
        run: |
          ssh root@135.181.206.109 '
            if [ -d /opt/palet ]; then
              cd /opt/palet && git fetch origin && git checkout main && git pull origin main
            else
              git clone -b main https://github.com/ozanturk19/palet.git /opt/palet
            fi
          '

      - name: Build Docker image on VPS
        run: |
          ssh root@135.181.206.109 '
            echo "=== Disk & Bellek ==="
            df -h / && free -h

            echo "=== Docker temizlik ==="
            docker container prune -f
            docker image prune -f

            echo "=== Build ==="
            cd /opt/palet/web
            docker build -t palet-web:latest .
          '

      - name: Deploy container on VPS
        run: |
          ssh root@135.181.206.109 << 'ENDSSH'
            ufw allow 8007/tcp 2>/dev/null || true
            ufw reload 2>/dev/null || true
            iptables -C INPUT -p tcp --dport 8007 -j ACCEPT 2>/dev/null || \
              iptables -I INPUT -p tcp --dport 8007 -j ACCEPT 2>/dev/null || true

            docker stop palet-web 2>/dev/null || true
            docker rm   palet-web 2>/dev/null || true
            docker run -d \
              --name palet-web \
              --restart unless-stopped \
              -e PORT=8007 \
              -e HOSTNAME=0.0.0.0 \
              -p 0.0.0.0:8007:8007 \
              palet-web:latest

            sleep 10
            docker ps | grep palet-web || (echo "HATA: container çalışmıyor"; docker logs palet-web; exit 1)
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8007)
            echo "Localhost HTTP: $STATUS"
            [ "$STATUS" = "200" ] || (echo "HATA: localhost $STATUS"; docker logs palet-web --tail 20; exit 1)
          ENDSSH

      - name: External health check
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" --max-time 15 http://135.181.206.109:8007)
          echo "Dış erişim HTTP: $STATUS"
          if [ "$STATUS" = "200" ]; then
            echo "✅ http://135.181.206.109:8007 — CANLI"
          else
            echo "❌ Dış erişim yok ($STATUS) — Hetzner cloud firewall'da port 8007 açılmalı"
            exit 1
          fi
