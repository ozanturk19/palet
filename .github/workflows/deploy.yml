name: Deploy PALET to VPS

on:
  push:
    branches:
      - claude/brand-web-design-uWMjl
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to VPS
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H 135.181.206.109 >> ~/.ssh/known_hosts

      - name: Install Docker on VPS (if not exists)
        run: |
          ssh root@135.181.206.109 '
            if ! command -v docker &> /dev/null; then
              apt-get update -qq
              apt-get install -y -qq docker.io git
              systemctl enable docker
              systemctl start docker
              echo "Docker kuruldu"
            else
              echo "Docker zaten kurulu: $(docker --version)"
            fi
          '

      - name: Pull latest code on VPS
        run: |
          ssh root@135.181.206.109 '
            if [ -d /opt/palet ]; then
              cd /opt/palet
              git fetch origin
              git checkout ${{ github.ref_name }} 2>/dev/null || git checkout claude/brand-web-design-uWMjl
              git pull origin ${{ github.ref_name }} 2>/dev/null || git pull origin claude/brand-web-design-uWMjl
            else
              git clone -b claude/brand-web-design-uWMjl https://github.com/ozanturk19/palet.git /opt/palet
            fi
          '

      - name: Build Docker image on VPS
        run: |
          ssh root@135.181.206.109 '
            cd /opt/palet/web
            docker build -t palet-web:latest .
            echo "Build tamamlandı"
          '

      - name: Restart container on VPS
        run: |
          ssh root@135.181.206.109 '
            # Firewall: port 8007 aç
            if command -v ufw &> /dev/null; then
              ufw allow 8007/tcp 2>/dev/null || true
              ufw --force enable 2>/dev/null || true
              echo "UFW: port 8007 açıldı"
            fi
            # iptables fallback
            iptables -C INPUT -p tcp --dport 8007 -j ACCEPT 2>/dev/null || \
              iptables -I INPUT -p tcp --dport 8007 -j ACCEPT 2>/dev/null || true

            # Container yeniden başlat
            docker stop palet-web 2>/dev/null || true
            docker rm palet-web 2>/dev/null || true
            docker run -d \
              --name palet-web \
              --restart unless-stopped \
              -p 0.0.0.0:8007:8007 \
              palet-web:latest
            sleep 5
            docker ps | grep palet-web
            curl -sf http://localhost:8007 > /dev/null && echo "✅ Localhost OK" || echo "⚠️ Localhost yanıt vermedi"
            echo "✅ Deploy tamamlandı → http://135.181.206.109:8007"
          '

      - name: Diagnostics
        run: |
          ssh root@135.181.206.109 '
            echo "=== Docker PS ==="
            docker ps -a

            echo "=== Container Logs ==="
            docker logs palet-web --tail 30 2>&1 || echo "log yok"

            echo "=== Port Dinleme ==="
            ss -tlnp | grep 8007 || echo "8007 dinlenmiyor!"

            echo "=== Localhost Curl ==="
            curl -sv http://localhost:8007 2>&1 | tail -20

            echo "=== UFW Status ==="
            ufw status 2>/dev/null || echo "ufw yok"

            echo "=== iptables 8007 ==="
            iptables -L INPUT -n | grep 8007 || echo "iptables kuralı yok"
          '
