<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- PALLET Leather — Icon Mark -->
  <!-- The E as a pallet: 3 planks with pointed/chamfered tips -->

  <!-- Vertical stringer (sol kenar) -->
  <rect x="14" y="12" width="10" height="76" fill="#8b4f2d"/>

  <!-- Top plank — full width, pointed tip -->
  <polygon points="14,12 72,12 84,20 72,28 14,28" fill="#8b4f2d"/>

  <!-- Middle plank — shorter, starts after stringer -->
  <polygon points="24,42 60,42 70,50 60,58 24,58" fill="#8b4f2d"/>

  <!-- Bottom plank — full width, pointed tip -->
  <polygon points="14,72 72,72 84,80 72,88 14,88" fill="#8b4f2d"/>
</svg>
