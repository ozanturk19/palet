<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PALLET Leather — Logo Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Raleway:wght@300&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  background: #e8e3dc;
  padding: 48px 32px;
  font-family: sans-serif;
}

.page-title {
  font-size: 10px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: #999;
  margin-bottom: 40px;
}

.variant-label {
  font-size: 10px;
  letter-spacing: 4px;
  text-transform: uppercase;
  color: #aaa;
  margin-bottom: 20px;
  margin-top: 48px;
  padding-bottom: 10px;
  border-bottom: 1px solid #d0cbc4;
}

/* ── 3-column grid ──────────────────────────────────────── */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 3px;
}

.card {
  display: flex;
  align-items: flex-start;
  justify-content: center;
  padding: 72px 40px 56px;
}

.card.bg-white { background: #faf9f7; }
.card.bg-cream { background: #f1ebe0; }
.card.bg-dark  { background: #161818; }

/* ── Logo wrap ──────────────────────────────────────────── */
.logo-wrap {
  display: flex;
  flex-direction: column;
  width: max-content;
  align-items: stretch;
}

/* ── Wordmark ───────────────────────────────────────────── */
.wordmark {
  display: flex;
  align-items: baseline;
  line-height: 1;
  white-space: nowrap;
}

.wordmark-text {
  color: #161818;
  line-height: 1;
}

.card.bg-dark .wordmark-text { color: #f1ebe0; }

/* ── E letterform ───────────────────────────────────────── */
.letter-e {
  display: inline-block;
  height: 0.72em;
  width: auto;
  flex-shrink: 0;
  align-self: flex-end;
  margin-bottom: 0.04em;
}

/* ── LEATHER row ────────────────────────────────────────── */
.leather-row {
  display: flex;
  align-items: center;
  margin-top: 10px;
  width: 100%;
}

.leather-row hr {
  flex: 1;
  border: none;
  border-top: 1px solid currentColor;
  opacity: 0.4;
}

.leather-text {
  font-size: 8.5px;
  letter-spacing: 5px;
  text-transform: uppercase;
  padding: 0 9px;
  white-space: nowrap;
  font-family: sans-serif;
  font-weight: 400;
}

.card.bg-white .leather-text,
.card.bg-cream .leather-text { color: #8b4f2d; }
.card.bg-dark  .leather-text { color: #c47a45; }

.card.bg-white .leather-row,
.card.bg-cream .leather-row  { color: #8b4f2d; }
.card.bg-dark  .leather-row  { color: #c47a45; }

/* ── Variant 1: Cinzel ──────────────────────────────────── */
.v-cinzel .wordmark      { font-size: 50px; letter-spacing: 4px; }
.v-cinzel .wordmark-text { font-family: 'Cinzel', serif; font-weight: 600; }

/* ── Variant 4: Raleway ─────────────────────────────────── */
.v-raleway .wordmark      { font-size: 46px; letter-spacing: 7px; }
.v-raleway .wordmark-text { font-family: 'Raleway', sans-serif; font-weight: 300; }

/* ── Card label ─────────────────────────────────────────── */
.card-inner {
  display: flex;
  flex-direction: column;
  align-items: center;
}
.card-label {
  margin-top: 18px;
  font-size: 8px;
  letter-spacing: 3px;
  text-transform: uppercase;
  color: #bbb;
}
.card.bg-dark .card-label { color: #444; }
</style>
</head>
<body>

<p class="page-title">PALLET Leather — Logo Alternatifleri</p>
